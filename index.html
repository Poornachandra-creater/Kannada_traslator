<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English ⇄ Kannada Translator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
 
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
 
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 1000px;
            width: 100%;
            overflow: hidden;
        }
 
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
 
        .header h1 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 10px;
        }
 
        .header p {
            font-size: 16px;
            opacity: 0.95;
        }
 
        .translator-body {
            padding: 30px;
        }
 
        .language-selector {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
        }
 
        .lang-btn {
            background: #f7f7f7;
            border: 2px solid #e0e0e0;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
 
        .lang-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
 
        .swap-btn {
            background: #667eea;
            border: none;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            color: white;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
 
        .swap-btn:hover {
            background: #5568d3;
            transform: rotate(180deg);
        }
 
        .translation-area {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
 
        .text-box {
            background: #f9f9f9;
            border: 2px solid #e0e0e0;
            border-radius: 16px;
            padding: 20px;
            min-height: 200px;
            position: relative;
        }
 
        .text-box-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
 
        .text-box-label {
            font-size: 14px;
            font-weight: 600;
            color: #667eea;
        }
 
        .speaker-btn {
            background: transparent;
            border: none;
            font-size: 20px;
            cursor: pointer;
            padding: 4px;
            transition: transform 0.2s;
        }
 
        .speaker-btn:hover {
            transform: scale(1.2);
        }
 
        textarea {
            width: 100%;
            min-height: 150px;
            border: none;
            background: transparent;
            font-size: 16px;
            resize: vertical;
            font-family: inherit;
            outline: none;
        }
 
        .output-text {
            font-size: 16px;
            line-height: 1.6;
            color: #333;
            min-height: 150px;
        }
 
        .translate-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 16px 48px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            display: block;
            margin: 0 auto;
            transition: all 0.3s;
        }
 
        .translate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
 
        .translate-btn:active {
            transform: translateY(0);
        }
 
        .char-count {
            font-size: 12px;
            color: #999;
            margin-top: 8px;
            text-align: right;
        }
 
        .loading {
            display: none;
            text-align: center;
            margin: 20px 0;
            color: #667eea;
            font-size: 14px;
        }
 
        .loading.active {
            display: block;
        }
 
        @media (max-width: 768px) {
            .translation-area {
                grid-template-columns: 1fr;
            }
 
            .header h1 {
                font-size: 24px;
            }
 
            .translator-body {
                padding: 20px;
            }
        }
 
        .kannada-font {
            font-family: 'Noto Sans Kannada', sans-serif;
        }
 
        .error-message {
            background: #ffe6e6;
            color: #d32f2f;
            padding: 12px;
            border-radius: 8px;
            margin: 20px 0;
            display: none;
        }
 
        .error-message.active {
            display: block;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Kannada:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>English ⇄ Kannada Translator</h1>
            <p>Translate text between English and Kannada instantly</p>
        </div>
 
        <div class="translator-body">
            <div class="language-selector">
                <div class="lang-btn active" id="sourceLang">English</div>
                <button class="swap-btn" id="swapBtn">⇄</button>
                <div class="lang-btn" id="targetLang">ಕನ್ನಡ (Kannada)</div>
            </div>
 
            <div class="translation-area">
                <div class="text-box">
                    <div class="text-box-header">
                        <span class="text-box-label" id="inputLabel">English</span>
                        <button class="speaker-btn" id="speakInput" title="Listen">🔊</button>
                    </div>
                    <textarea 
                        id="inputText" 
                        placeholder="Type or paste text here..."
                        maxlength="5000"
                    ></textarea>
                    <div class="char-count">
                        <span id="charCount">0</span> / 5000
                    </div>
                </div>
 
                <div class="text-box">
                    <div class="text-box-header">
                        <span class="text-box-label" id="outputLabel">ಕನ್ನಡ (Kannada)</span>
                        <button class="speaker-btn" id="speakOutput" title="Listen" style="display:none;">🔊</button>
                    </div>
                    <div class="output-text kannada-font" id="outputText">Translation will appear here...</div>
                </div>
            </div>
 
            <div class="loading" id="loading">Translating...</div>
            <div class="error-message" id="errorMessage"></div>
 
            <button class="translate-btn" id="translateBtn">Translate</button>
        </div>
    </div>
 
    <script>
        let isEnglishToKannada = true;
        const inputText = document.getElementById('inputText');
        const outputText = document.getElementById('outputText');
        const translateBtn = document.getElementById('translateBtn');
        const swapBtn = document.getElementById('swapBtn');
        const sourceLang = document.getElementById('sourceLang');
        const targetLang = document.getElementById('targetLang');
        const inputLabel = document.getElementById('inputLabel');
        const outputLabel = document.getElementById('outputLabel');
        const charCount = document.getElementById('charCount');
        const loading = document.getElementById('loading');
        const errorMessage = document.getElementById('errorMessage');
        const speakInput = document.getElementById('speakInput');
        const speakOutput = document.getElementById('speakOutput');
 
        // Character count
        inputText.addEventListener('input', () => {
            charCount.textContent = inputText.value.length;
        });
 
        // Swap languages
        swapBtn.addEventListener('click', () => {
            isEnglishToKannada = !isEnglishToKannada;
            
            sourceLang.classList.toggle('active');
            targetLang.classList.toggle('active');
 
            if (isEnglishToKannada) {
                sourceLang.textContent = 'English';
                targetLang.textContent = 'ಕನ್ನಡ (Kannada)';
                inputLabel.textContent = 'English';
                outputLabel.textContent = 'ಕನ್ನಡ (Kannada)';
                inputText.placeholder = 'Type or paste text here...';
                inputText.classList.remove('kannada-font');
                outputText.classList.add('kannada-font');
            } else {
                sourceLang.textContent = 'ಕನ್ನಡ (Kannada)';
                targetLang.textContent = 'English';
                inputLabel.textContent = 'ಕನ್ನಡ (Kannada)';
                outputLabel.textContent = 'English';
                inputText.placeholder = 'ಇಲ್ಲಿ ಟೈಪ್ ಮಾಡಿ ಅಥವಾ ಪೇಸ್ಟ್ ಮಾಡಿ...';
                inputText.classList.add('kannada-font');
                outputText.classList.remove('kannada-font');
            }
 
            // Clear previous translation
            outputText.textContent = 'Translation will appear here...';
            inputText.value = '';
            charCount.textContent = '0';
            speakOutput.style.display = 'none';
        });
 
        // Text-to-speech for input
        speakInput.addEventListener('click', () => {
            if (inputText.value.trim()) {
                const utterance = new SpeechSynthesisUtterance(inputText.value);
                utterance.lang = isEnglishToKannada ? 'en-US' : 'kn-IN';
                speechSynthesis.speak(utterance);
            }
        });
 
        // Text-to-speech for output
        speakOutput.addEventListener('click', () => {
            if (outputText.textContent && outputText.textContent !== 'Translation will appear here...') {
                const utterance = new SpeechSynthesisUtterance(outputText.textContent);
                utterance.lang = isEnglishToKannada ? 'kn-IN' : 'en-US';
                speechSynthesis.speak(utterance);
            }
        });
 
        // Translation function using Google Translate API
        async function translateText() {
            const text = inputText.value.trim();
            
            if (!text) {
                showError('Please enter some text to translate');
                return;
            }
 
            loading.classList.add('active');
            errorMessage.classList.remove('active');
            translateBtn.disabled = true;
 
            try {
                const sourceLangCode = isEnglishToKannada ? 'en' : 'kn';
                const targetLangCode = isEnglishToKannada ? 'kn' : 'en';
 
                // Using Google Translate API via translate.googleapis.com
                const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=${sourceLangCode}&tl=${targetLangCode}&dt=t&q=${encodeURIComponent(text)}`;
                
                const response = await fetch(url);
                const data = await response.json();
 
                if (data && data[0]) {
                    // Google Translate returns an array of translations
                    let translatedText = '';
                    data[0].forEach(item => {
                        if (item[0]) {
                            translatedText += item[0];
                        }
                    });
                    
                    outputText.textContent = translatedText;
                    speakOutput.style.display = 'block';
                } else {
                    throw new Error('Translation failed');
                }
 
            } catch (error) {
                showError('Translation failed. Please check your connection and try again.');
                console.error('Translation error:', error);
            } finally {
                loading.classList.remove('active');
                translateBtn.disabled = false;
            }
        }
 
        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.add('active');
            setTimeout(() => {
                errorMessage.classList.remove('active');
            }, 5000);
        }
 
        // Translate button click
        translateBtn.addEventListener('click', translateText);
 
        // Enter key to translate (Ctrl+Enter)
        inputText.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'Enter') {
                translateText();
            }
        });
    </script>
</body>
</html>
